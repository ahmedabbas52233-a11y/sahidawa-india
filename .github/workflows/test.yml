name: SahiDawa CI / Test Suite

on:
    push:
        branches: [main, dev]
    pull_request:
        branches: [main, dev]
    workflow_dispatch:

jobs:
    test-node-apps:
        name: 🧪 Build & Test Node.js Apps (Web & API)
        runs-on: ubuntu-latest
        timeout-minutes: 20
        services:
            redis:
                image: redis:alpine
                ports:
                    - 6379:6379
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
        steps:
            - name: ⬇️ Checkout Code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 2

            - name: ⚙️ Setup Node.js from .nvmrc
              uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
                  cache: "npm"

            - name: 📦 Upgrade npm
              run: npm install -g npm@10

            - name: 📦 Install Dependencies (Monorepo)
              run: npm install --legacy-peer-deps
            
            - name: ⚡ Cache Turborepo
              uses: actions/cache@v4
              id: turbo-cache
              with:
                  path: .turbo
                  key: ${{ runner.os }}-turbo-${{ github.ref_name }}-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-${{ github.ref_name }}-
                      ${{ runner.os }}-turbo-main-
                      ${{ runner.os }}-turbo-

            - name: 🧪 Run Tests
              run: npm run test -- --forceExit

