name: "Auto Issue Assigner & Prevention"

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write

jobs:
  auto-assign-limit:
    runs-on: ubuntu-latest
    # Trigger only if comment contains "/assign", "please assign", or "assign me" (case-insensitive)
    if: >
      contains(github.event.comment.body, '/assign') ||
      contains(github.event.comment.body, 'please assign') ||
      contains(github.event.comment.body, 'assign me') ||
      contains(github.event.comment.body, 'Assign me') ||
      contains(github.event.comment.body, 'Please assign')
    
    steps:
      - name: Auto Assign Verification
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const commenter = context.payload.comment.user.login;
            const issueNumber = context.issue.number;
            const repo = context.repo;

            console.log(`Processing assignment request from ${commenter} for issue #${issueNumber}...`);

            // 1. Check if the issue is already assigned
            const currentIssue = await github.rest.issues.get({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: issueNumber
            });

            if (currentIssue.data.assignees && currentIssue.data.assignees.length > 0) {
              const assignedUser = currentIssue.data.assignees[0].login;
              if (assignedUser === commenter) {
                console.log(`Issue #${issueNumber} is already assigned to the commenter.`);
                return;
              }
              
              await github.rest.issues.createComment({
                owner: repo.owner,
                repo: repo.repo,
                issue_number: issueNumber,
                body: `⚠️ Hi @${commenter}, this issue is already assigned to @${assignedUser}. Please check out our other open issues! 🔍`
              });
              return;
            }

            // 2. Fetch all open issues in the repository assigned to this commenter
            const assignedIssues = await github.rest.issues.listForRepo({
              owner: repo.owner,
              repo: repo.repo,
              assignee: commenter,
              state: 'open'
            });

            // Filter out pull requests (GitHub API lists PRs as issues)
            const activeAssignedIssues = assignedIssues.data.filter(issue => !issue.pull_request);

            if (activeAssignedIssues.length >= 3) {
              const assignedIssueList = activeAssignedIssues.map(i => `#${i.number} ("${i.title}")`).join('\n- ');
              console.log(`Denying assignment: @${commenter} already holds ${activeAssignedIssues.length} active issues.`);

              await github.rest.issues.createComment({
                owner: repo.owner,
                repo: repo.repo,
                issue_number: issueNumber,
                body: `❌ **Assignment Denied**\n\nHi @${commenter}, to ensure fair opportunities for everyone participating in GSSoC/Hacktoberfest, contributors are limited to a maximum of **3 active assigned issues** at a time.\n\nYou are already assigned to the following ${activeAssignedIssues.length} active tasks:\n- ${assignedIssueList}\n\nPlease complete your currently assigned tasks before requesting assignment for new ones! Thank you for your cooperation! 🤝`
              });
              return;
            }

            // 3. Assign them to this issue
            console.log(`Assigning issue #${issueNumber} to @${commenter}...`);

            await github.rest.issues.addAssignees({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: issueNumber,
              assignees: [commenter]
            });

            await github.rest.issues.createComment({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: issueNumber,
              body: `🎉 **Issue Assigned & Locked!**\n\nHi @${commenter}, this issue has been successfully assigned to you! The conversation has been locked to prevent spam from other contributors.\n\n🚀 **Next Steps:**\n- Create a new branch for your edits.\n- Link your PR to this issue (e.g. \`Closes #${issueNumber}\`).\n- Submit your PR within **3 days** to avoid automatic expiration and release back to the community.\n\nHappy Coding! 💻✨`
            });

            // 4. Lock the issue conversation to prevent comment spam
            console.log(`Locking issue #${issueNumber} to prevent comment spam...`);
            await github.rest.issues.lock({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: issueNumber
            });
